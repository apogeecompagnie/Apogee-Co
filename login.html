<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Apogée & Co</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap');
:root{
  --navy:#0e1629;--navy2:#1a2744;--navy3:#0b1120;
  --gold:#C9A84C;--gold-l:#e8d5a3;--gray:#8a9ab8;--text:#d4c9b0;
  --success:#1d9e75;--danger:#e24b4a;--warn:#f59e0b;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;background:var(--navy3);color:var(--text);min-height:100vh;}

/* ── TOPBAR ── */
.topbar{height:64px;background:rgba(14,22,41,0.98);border-bottom:1px solid rgba(201,168,76,0.15);
  display:flex;align-items:center;justify-content:space-between;padding:0 28px;
  position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.topbar-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
.topbar-logo img{height:36px;width:36px;}
.topbar-brand{font-family:'Cormorant Garamond',serif;font-size:17px;letter-spacing:0.18em;color:var(--gold);}
.topbar-brand-sub{font-size:8px;letter-spacing:0.3em;color:var(--gray);display:block;margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.topbar-user{font-size:11px;color:var(--gray);letter-spacing:0.08em;}
.topbar-user strong{color:var(--gold-l);}
.topbar-btn{font-size:9px;letter-spacing:0.22em;color:var(--gray);background:transparent;
  border:1px solid rgba(201,168,76,0.2);padding:7px 16px;cursor:pointer;
  font-family:'Montserrat',sans-serif;transition:all 0.3s;text-decoration:none;display:inline-block;}
.topbar-btn:hover{color:var(--gold);border-color:var(--gold);}
.topbar-btn.danger{border-color:rgba(226,75,74,0.3);color:var(--danger);}
.topbar-btn.danger:hover{border-color:var(--danger);}

/* ── SIDEBAR ── */
.layout{display:flex;min-height:calc(100vh - 64px);}
.sidebar{width:220px;min-width:220px;background:#080e1a;
  border-right:1px solid rgba(201,168,76,0.08);
  padding:24px 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
.sidebar-section{padding:0 12px;margin-bottom:24px;}
.sidebar-title{font-size:8px;letter-spacing:0.38em;color:var(--gold);font-weight:600;
  margin-bottom:8px;padding:0 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 10px;border-radius:4px;
  cursor:pointer;font-size:11px;color:var(--gray);letter-spacing:0.06em;
  border:none;background:transparent;width:100%;text-align:left;
  font-family:'Montserrat',sans-serif;text-decoration:none;transition:all 0.2s;}
.nav-item:hover{background:rgba(201,168,76,0.06);color:var(--text);}
.nav-item.active{background:rgba(201,168,76,0.1);color:var(--gold);}
.nav-item svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;flex-shrink:0;}
.nav-badge{font-size:9px;background:rgba(201,168,76,0.15);color:var(--gold);
  padding:2px 7px;border-radius:10px;margin-left:auto;}
.nav-badge.red{background:rgba(226,75,74,0.15);color:var(--danger);}

/* ── MAIN ── */
.main{flex:1;padding:32px;overflow-y:auto;}
.page-section{display:none;}
.page-section.active{display:block;}

/* ── WIDGETS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{background:var(--navy2);border:1px solid rgba(201,168,76,0.1);padding:20px 22px;transition:border-color 0.3s;}
.stat-card:hover{border-color:rgba(201,168,76,0.3);}
.stat-label{font-size:8.5px;letter-spacing:0.3em;color:var(--gray);margin-bottom:10px;font-weight:500;}
.stat-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--gold-l);line-height:1;}
.stat-sub{font-size:10px;color:var(--gray);margin-top:6px;}
.stat-icon{float:right;margin-top:-2px;}
.stat-icon svg{width:18px;height:18px;fill:none;stroke:var(--gold);stroke-width:1.3;opacity:0.6;}

/* ── CARDS ── */
.card{background:var(--navy2);border:1px solid rgba(201,168,76,0.1);margin-bottom:16px;}
.card-header{padding:18px 22px 14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(201,168,76,0.07);}
.card-title{font-size:11px;letter-spacing:0.25em;color:var(--gold);font-weight:600;}
.card-body{padding:18px 22px;}
.card-action{font-size:9px;letter-spacing:0.2em;color:var(--gold);background:transparent;
  border:1px solid rgba(201,168,76,0.25);padding:6px 14px;cursor:pointer;
  font-family:'Montserrat',sans-serif;transition:all 0.3s;}
.card-action:hover{background:rgba(201,168,76,0.08);}

/* ── PAGE TITLE ── */
.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(24px,3.5vw,36px);
  font-weight:300;color:var(--gold-l);margin-bottom:4px;}
.page-sub{font-size:11px;color:var(--gray);letter-spacing:0.08em;margin-bottom:28px;}

/* ── FORM ── */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.form-label{font-size:9px;letter-spacing:0.28em;color:var(--gold);}
.form-input{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);
  color:var(--gold-l);font-family:'Montserrat',sans-serif;font-size:13px;
  font-weight:300;padding:12px 14px;outline:none;transition:border-color 0.3s;width:100%;}
.form-input:focus{border-color:var(--gold);}
.form-input::placeholder{color:var(--gray);opacity:0.6;}
.form-select{background:var(--navy2);appearance:none;cursor:pointer;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.btn{font-size:10px;letter-spacing:0.25em;border:none;padding:13px 28px;
  cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.3s;display:inline-block;}
.btn-primary{color:var(--navy);background:var(--gold);}
.btn-primary:hover{background:var(--gold-l);}
.btn-outline{color:var(--gold);background:transparent;border:1px solid rgba(201,168,76,0.35);}
.btn-outline:hover{background:rgba(201,168,76,0.08);}
.btn-full{width:100%;}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:1px solid rgba(201,168,76,0.2);}
th{font-size:8.5px;letter-spacing:0.25em;color:var(--gold);font-weight:600;
  padding:10px 14px;text-align:left;}
td{padding:12px 14px;color:var(--gray);border-bottom:1px solid rgba(201,168,76,0.05);vertical-align:middle;}
tr:hover td{background:rgba(201,168,76,0.03);}
td strong{color:var(--text);}

/* ── STATUS BADGES ── */
.badge{font-size:8.5px;letter-spacing:0.15em;padding:3px 10px;border-radius:2px;font-weight:500;}
.badge-pending{background:rgba(245,158,11,0.12);color:var(--warn);}
.badge-active{background:rgba(29,158,117,0.12);color:var(--success);}
.badge-done{background:rgba(138,154,184,0.12);color:var(--gray);}
.badge-new{background:rgba(201,168,76,0.12);color:var(--gold);}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;}
.tl-item{display:flex;gap:16px;padding-bottom:20px;position:relative;}
.tl-item:not(:last-child)::before{content:'';position:absolute;left:15px;top:32px;bottom:0;
  width:1px;background:rgba(201,168,76,0.12);}
.tl-dot{width:30px;height:30px;min-width:30px;border:1px solid rgba(201,168,76,0.35);
  display:flex;align-items:center;justify-content:center;background:var(--navy2);z-index:1;}
.tl-dot svg{width:12px;height:12px;fill:none;stroke:var(--gold);stroke-width:1.5;}
.tl-content{flex:1;padding-top:4px;}
.tl-title{font-size:12.5px;font-weight:500;color:var(--text);margin-bottom:3px;}
.tl-meta{font-size:11px;color:var(--gray);}

/* ── CHAT ── */
.chat-wrap{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;max-height:320px;overflow-y:auto;}
.msg{display:flex;gap:10px;align-items:flex-start;}
.msg.mine{flex-direction:row-reverse;}
.msg-bubble{max-width:75%;padding:11px 14px;font-size:12.5px;line-height:1.65;}
.msg .msg-bubble{background:var(--navy2);color:var(--text);border:1px solid rgba(201,168,76,0.08);}
.msg.mine .msg-bubble{background:rgba(201,168,76,0.1);color:var(--gold-l);border:1px solid rgba(201,168,76,0.2);}
.msg-meta{font-size:10px;color:var(--gray);margin-top:4px;}
.msg-avatar{width:28px;height:28px;min-width:28px;border:1px solid rgba(201,168,76,0.3);
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gold);}
.chat-input-wrap{display:flex;gap:10px;}
.chat-input{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.2);
  color:var(--gold-l);font-family:'Montserrat',sans-serif;font-size:12px;
  padding:11px 14px;outline:none;resize:none;}

/* ── CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day{padding:8px 4px;text-align:center;font-size:11px;color:var(--gray);border-radius:2px;}
.cal-day.header{color:var(--gold);font-size:9px;letter-spacing:0.15em;font-weight:600;}
.cal-day.today{background:rgba(201,168,76,0.15);color:var(--gold-l);}
.cal-day.has-event{border:1px solid rgba(201,168,76,0.3);cursor:pointer;}
.cal-day.has-event:hover{background:rgba(201,168,76,0.08);}
.cal-day.other-month{opacity:0.3;}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:rgba(29,158,117,0.9);
  color:#fff;font-size:11px;letter-spacing:0.08em;padding:12px 20px;
  transform:translateY(80px);transition:transform 0.3s;z-index:999;}
#toast.show{transform:translateY(0);}

/* ── LOADING ── */
.loading-overlay{position:fixed;inset:0;background:var(--navy3);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity 0.5s;}
.loading-overlay.hidden{opacity:0;pointer-events:none;}
.spinner{width:36px;height:36px;border:2px solid rgba(201,168,76,0.2);
  border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .form-row{grid-template-columns:1fr;}
  .stats-grid{grid-template-columns:1fr 1fr;}
}
</style>
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;
  background:var(--navy3);padding:20px;}
.login-wrap{width:100%;max-width:420px;}
.login-logo{text-align:center;margin-bottom:36px;}
.login-logo img{width:80px;height:80px;margin-bottom:16px;}
.login-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;
  color:var(--gold-l);letter-spacing:0.06em;}
.login-sub{font-size:10px;letter-spacing:0.25em;color:var(--gray);margin-top:6px;}
.login-card{background:var(--navy2);border:1px solid rgba(201,168,76,0.15);padding:36px 32px;}
.login-ornament{display:flex;align-items:center;justify-content:center;gap:12px;margin:0 0 28px;}
.login-ornament-bar{width:40px;height:1px;background:var(--gold);opacity:0.35;}
.login-ornament-dia{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);opacity:0.7;}
.error-msg{background:rgba(226,75,74,0.1);border:1px solid rgba(226,75,74,0.25);
  color:var(--danger);font-size:12px;padding:11px 14px;margin-bottom:14px;display:none;}
.forgot-link{font-size:10px;color:var(--gray);letter-spacing:0.1em;text-decoration:none;
  display:block;text-align:right;margin-top:-6px;margin-bottom:14px;transition:color 0.2s;}
.forgot-link:hover{color:var(--gold);}
.login-footer{text-align:center;margin-top:20px;font-size:10px;color:var(--gray);}
.login-footer a{color:var(--gold);text-decoration:none;}
</style>

    <div class="login-title">Apogée & Co</div>
    <div class="login-sub">ESPACE MEMBRES</div>
  </div>

  <div class="login-card">
    <div class="login-ornament">
      <div class="login-ornament-bar"></div>
      <div class="login-ornament-dia"></div>
      <div class="login-ornament-bar"></div>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">ADRESSE EMAIL</label>
      <input type="email" id="email" class="form-input" placeholder="votre@email.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label class="form-label">MOT DE PASSE</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <a href="#" class="forgot-link" onclick="resetPassword()">Mot de passe oublié ?</a>

    <button class="btn btn-primary btn-full" onclick="login()" id="login-btn">SE CONNECTER</button>

    <div class="login-footer" style="margin-top:24px;">
      Accès sur invitation uniquement.<br>
      <a href="index.html">Retour au site</a>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Config Firebase ──────────────────────────────────────────────────────
const cfg = {
  apiKey:            "AIzaSyCthdmlR6D2wgtMhBUQ6ZwHCBY5wHSN9o4",
  authDomain:        "apogee-co.firebaseapp.com",
  projectId:         "apogee-co",
  storageBucket:     "apogee-co.firebasestorage.app",
  messagingSenderId: "752278064291",
  appId:             "1:752278064291:web:d22a3a6ac0d7da6c69c316"
};
const app  = initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);

// Si déjà connecté → rediriger
// Afficher le formulaire immédiatement — pas d'attente Firebase
document.getElementById("loading").classList.add("hidden");

// Vérifier si déjà connecté en arrière-plan
onAuthStateChanged(auth, async user => {
  if (user) {
    try {
      const snap = await getDoc(doc(db, "users", user.uid));
      const role = snap.exists() ? snap.data().role : "b2c";
      redirect(role);
    } catch(e) {
      console.warn("Firestore error:", e.message);
    }
  }
});

function redirect(role) {
  const map = { b2c:"dashboard-b2c.html", b2b:"dashboard-b2b.html", admin:"admin-membres.html" };
  const target = map[role] || "dashboard-b2c.html";
  // Chemin robuste : remplace login.html par la cible
  const currentUrl = window.location.href;
  const base = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
  window.location.replace(base + target);
}

window.login = async function() {
  const email    = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn      = document.getElementById("login-btn");
  const errDiv   = document.getElementById("error-msg");
  errDiv.style.display = "none";
  errDiv.style.cssText = "";

  if (!email || !password) {
    errDiv.textContent = "Veuillez remplir tous les champs.";
    errDiv.style.display = "block";
    return;
  }

  btn.textContent = "CONNEXION EN COURS...";
  btn.disabled = true;

  try {
    // Étape 1 : authentification
    const cred = await signInWithEmailAndPassword(auth, email, password);
    
    // Étape 2 : récupérer le rôle
    let role = "b2c";
    try {
      const snap = await getDoc(doc(db, "users", cred.user.uid));
      if (snap.exists()) role = snap.data().role || "b2c";
    } catch(firestoreErr) {
      // Firestore inaccessible — on redirige quand même en b2c
      console.warn("Firestore:", firestoreErr.message);
    }
    
    // Étape 3 : redirection
    redirect(role);

  } catch(e) {
    const msgs = {
      "auth/user-not-found":     "Aucun compte associé à cet email.",
      "auth/wrong-password":     "Mot de passe incorrect.",
      "auth/invalid-email":      "Adresse email invalide.",
      "auth/too-many-requests":  "Trop de tentatives. Réessayez dans quelques minutes.",
      "auth/invalid-credential": "Email ou mot de passe incorrect.",
      "auth/network-request-failed": "Erreur réseau. Vérifiez votre connexion.",
      "auth/unauthorized-domain": "Domaine non autorisé dans Firebase."
    };
    // Afficher l'erreur complète pour déboguer
    const msg = msgs[e.code] || ("Erreur [" + (e.code||"?") + "] : " + e.message);
    errDiv.textContent = msg;
    errDiv.style.display = "block";
    errDiv.style.padding = "12px";
    errDiv.style.wordBreak = "break-all";
    btn.textContent = "SE CONNECTER";
    btn.disabled = false;
  }
};

window.resetPassword = async function() {
  const email = document.getElementById("email").value.trim();
  if (!email) {
    document.getElementById("error-msg").textContent = "Entrez votre email pour réinitialiser le mot de passe.";
    document.getElementById("error-msg").style.display = "block";
    return;
  }
  await sendPasswordResetEmail(auth, email);
  document.getElementById("error-msg").style.cssText = "display:block;background:rgba(29,158,117,0.1);border-color:rgba(29,158,117,0.25);color:var(--success);";
  document.getElementById("error-msg").textContent = "Email de réinitialisation envoyé. Vérifiez votre boîte.";
};

document.addEventListener("keydown", e => { if(e.key==="Enter") window.login(); });
</script>
