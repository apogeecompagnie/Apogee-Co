<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged, signOut,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore, doc, getDoc, setDoc, collection,
  query, where, orderBy, getDocs, addDoc,
  updateDoc, deleteDoc, serverTimestamp, limit,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ================= CONFIG ================= */

const cfg = {
  apiKey: "AIzaSy...",
  authDomain: "apogee-co.firebaseapp.com",
  projectId: "apogee-co",
};

const app = initializeApp(cfg);
const auth = getAuth(app);
const db = getFirestore(app);

/* ⚠️ IMPORTANT: secondary app pour créer utilisateurs */
const secondaryApp = initializeApp(cfg, "Secondary");
const secondaryAuth = getAuth(secondaryApp);

/* ================= GLOBAL ================= */

let currentUser = null;
let allMembres = [];
let currentConvUid = null;

/* ================= UTILS ================= */

function escapeHTML(str = "") {
  return str.replace(/[&<>"']/g, c => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#39;"
  }[c]));
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

/* ================= AUTH ================= */

onAuthStateChanged(auth, async user => {
  if (!user) return location.href = "login.html";

  const snap = await getDoc(doc(db, "users", user.uid));
  if (!snap.exists() || snap.data().role !== "admin") {
    return location.href = "login.html";
  }

  currentUser = user;
  document.getElementById("loading").classList.add("hidden");

  await Promise.all([
    loadStats(),
    loadMembres(),
    loadDemandes(),
    loadConvList()
  ]);
});

/* ================= NAV ================= */

window.nav = function(id) {
  document.querySelectorAll(".page-section").forEach(s => s.classList.remove("active"));
  document.getElementById("sec-" + id).classList.add("active");
};

window.logout = () => signOut(auth);

/* ================= STATS ================= */

async function loadStats() {
  const snap = await getDocs(collection(db,"users"));
  const users = snap.docs.map(d=>d.data());

  document.getElementById("a-membres").textContent = users.length;
  document.getElementById("a-b2c").textContent = users.filter(u=>u.role==="b2c").length;
  document.getElementById("a-b2b").textContent = users.filter(u=>u.role==="b2b").length;
}

/* ================= MEMBRES ================= */

async function loadMembres() {
  const snap = await getDocs(collection(db,"users"));
  allMembres = snap.docs.map(d=>({id:d.id,...d.data()}));
  renderMembres(allMembres);
}

function renderMembres(list) {
  const tbody = document.getElementById("membres-list");
  tbody.innerHTML = "";

  list.forEach(m => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><strong>${escapeHTML(m.prenom || m.nom || "—")}</strong></td>
      <td>${escapeHTML(m.email || "—")}</td>
      <td>${m.role}</td>
      <td>${m.createdAt?.toDate()?.toLocaleDateString("fr-FR") || "—"}</td>
      <td>ACTIF</td>
      <td>
        <button class="msg">MSG</button>
        <button class="del">SUP</button>
      </td>
    `;

    tr.querySelector(".msg").addEventListener("click", () => {
      openConv(m.id, m.prenom || m.nom);
    });

    tr.querySelector(".del").addEventListener("click", async () => {
      if (!confirm("Supprimer ?")) return;
      await deleteDoc(doc(db,"users",m.id));
      showToast("Supprimé");
      loadMembres();
    });

    tbody.appendChild(tr);
  });
}

/* ================= CREATE USER ================= */

window.createMembre = async function() {
  const email = nmEmail.value.trim();
  const pwd = nmPwd.value.trim();
  const nom = nmNom.value.trim();

  if (!email || !pwd || !nom) return alert("Champs requis");

  try {
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pwd);

    await setDoc(doc(db,"users",cred.user.uid), {
      prenom: nom,
      email,
      role: nmRole.value,
      createdAt: serverTimestamp()
    });

    showToast("Compte créé");
    loadMembres();

  } catch(e) {
    alert(e.message);
  }
};

/* ================= DEMANDES ================= */

async function loadDemandes() {
  const q = query(collection(db,"demandes"), orderBy("createdAt","desc"));
  const snap = await getDocs(q);

  document.getElementById("demandes-list").innerHTML =
    snap.docs.map(d => {
      const i = d.data();
      return `
        <tr>
          <td>${escapeHTML(i.type || "—")}</td>
          <td>${escapeHTML(i.date || "—")}</td>
        </tr>
      `;
    }).join("");
}

/* ================= CHAT (REALTIME) ================= */

window.openConv = function(uid, name) {
  currentConvUid = uid;

  const q = query(
    collection(db,"messages"),
    where("roomId","==",uid),
    orderBy("createdAt","asc")
  );

  onSnapshot(q, snap => {
    const chat = document.getElementById("admin-chat");
    chat.innerHTML = "";

    snap.docs.forEach(d => {
      const m = d.data();

      const div = document.createElement("div");
      div.textContent = m.text;
      chat.appendChild(div);
    });
  });
};

window.sendAdminMsg = async function() {
  if (!currentConvUid) return;

  const text = adminMsg.value.trim();
  if (!text) return;

  await addDoc(collection(db,"messages"), {
    roomId: currentConvUid,
    from: currentUser.uid,
    text,
    createdAt: serverTimestamp()
  });

  adminMsg.value = "";
};

</script>
